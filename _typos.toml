[default]
extend-ignore-re = [
  # Ignore base64 encoded strings
  "[A-Za-z0-9+/]{20,}={0,2}",
  # Ignore hex strings
  "[0-9a-fA-F]{32,}",
  # Ignore UUIDs
  "[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}",
]

[default.extend-words]
# Technical words that are not typos
nuxt = "nuxt"
composables = "composables"
pnpm = "pnpm"
nuxtui = "nuxtui"
unovis = "unovis"
nitro = "nitro"
vite = "vite"

[files]
extend-exclude = [
  # Dependencies and build
  "*.log",
  "pnpm-lock.yaml",
  "package-lock.json",
  "node_modules/",
  ".nuxt/",
  ".output/",
  "coverage/",
  "dist/",
  # Content files (may contain Spanish)
  "**/*.vue",
  "**/*.md",
  "**/*.json",
  "**/locales/**",
]

