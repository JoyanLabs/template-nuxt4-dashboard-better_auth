[default]
extend-ignore-re = [
  # Ignore base64 encoded strings
  "[A-Za-z0-9+/]{20,}={0,2}",
  # Ignore hex strings
  "[0-9a-fA-F]{32,}",
  # Ignore UUIDs
  "[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}",
]

[default.extend-words]
# Add custom words that are not typos
nuxt = "nuxt"
composables = "composables"
pnpm = "pnpm"
nuxtui = "nuxtui"
unovis = "unovis"

[files]
extend-exclude = [
  "*.log",
  "pnpm-lock.yaml",
  "package-lock.json",
  "node_modules/",
  ".nuxt/",
  ".output/",
  "coverage/",
  "dist/",
]

