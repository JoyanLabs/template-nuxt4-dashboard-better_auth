name: 🚀 CI

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Build, Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout 🛬
        uses: actions/checkout@v6

      - name: Setup Node ⚙️
        uses: ./.github/actions/setup-node

      - name: Build Nuxt app 📦
        run: pnpm build

      - name: Verify build output ✅
        run: 'test -f .output/server/index.mjs || (echo "Error: Build output not found" && exit 1)'

      - name: Lint code 💅
        run: pnpm run lint

      - name: Typecheck 🔍
        run: pnpm run typecheck
